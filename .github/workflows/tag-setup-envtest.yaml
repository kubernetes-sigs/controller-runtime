name: Tag setup-envtest

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  create-mangled-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a new tag via API
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag=v7.0.0
        with:
          fetch-tags: true

      - name: Validate and Create Tag
        id: copy-tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./hack/tag-setup-envtest.sh
