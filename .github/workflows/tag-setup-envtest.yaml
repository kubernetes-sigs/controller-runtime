name: Tag setup-envtest

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  create-mangled-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a new tag via API
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag=v6.0.3
        with:
          fetch-tags: true

      - name: Validate and Create Tag
        id: copy-tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./hack/tag-setup-envtest.sh
